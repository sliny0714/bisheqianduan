server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/supplier_db?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # 支付宝配置
  alipay:
    app-id: 2021000000000000  # 沙盒应用ID
    app-private-key: 你的私钥
    alipay-public-key: 支付宝公钥
    server-url: https://openapi.alipaydev.com/gateway.do
    notify-url: http://localhost:8080/api/alipay/notify
    return-url: http://localhost:3000/order/my

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl